name: CD

on:
  push:
    tags: ['v*']

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for CI and verify it passed
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Waiting for CI checks to complete for $COMMIT_SHA..."

          # Retry up to 30 times (5 min) waiting for checks to finish
          for i in $(seq 1 30); do
            RESULT=$(gh api "repos/$REPO/commits/$COMMIT_SHA/check-runs" \
              --jq '[.check_runs[] | select(.app.slug == "github-actions" and .name != "CI Gate" and .name != "Wait for CI and verify it passed") | {name: .name, conclusion: .conclusion, status: .status, completed_at: .completed_at}] | group_by(.name) | map(sort_by(.completed_at // "9999") | last)')

            PENDING=$(echo "$RESULT" | jq '[.[] | select(.status != "completed")] | length')
            if [ "$PENDING" -gt 0 ]; then
              echo "Attempt $i/30: $PENDING check(s) still running, waiting 10s..."
              sleep 10
              continue
            fi

            CONCLUSIONS=$(echo "$RESULT" | jq '[.[] | .conclusion] | unique')
            echo "Check conclusions: $CONCLUSIONS"

            if [ "$CONCLUSIONS" = '["success"]' ]; then
              echo "All CI checks passed."
              exit 0
            else
              echo "::error::CI checks did not all pass: $CONCLUSIONS"
              exit 1
            fi
          done

          echo "::error::Timed out waiting for CI checks to complete"
          exit 1

  build-and-push:
    name: Build & Push Docker Image
    needs: ci-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      # Single production image used for all roles (app, horizon, scheduler).
      # The role is determined at runtime by CONTAINER_ROLE env var and command override.
      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc6fbf # v6.18.0
        with:
          context: .
          file: docker/app/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production
          provenance: true
          sbom: true


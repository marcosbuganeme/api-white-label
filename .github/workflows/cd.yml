name: CD

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - name: Wait for CI and verify it passed
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Waiting for CI checks on $COMMIT_SHA..."
          CI_JOBS='["Code Style (Pint)","Static Analysis (PHPStan)","Tests","Security Audit"]'

          for i in $(seq 1 90); do
            RESULT=$(gh api "repos/$REPO/commits/$COMMIT_SHA/check-runs" \
              --jq "[.check_runs[] | select(.name as \$n | $CI_JOBS | index(\$n))]" 2>&1) || {
              echo "::warning::API call failed, retrying..."
              sleep 10
              continue
            }

            FOUND=$(echo "$RESULT" | jq 'length')
            if [ "$FOUND" -lt 4 ]; then
              if [ "$i" -gt 24 ]; then
                echo "::error::Only $FOUND/4 CI checks found after $i attempts."
                exit 1
              fi
              echo "Attempt $i/90: $FOUND/4 CI checks found, waiting 10s..."
              sleep 10
              continue
            fi

            PENDING=$(echo "$RESULT" | jq '[.[] | select(.status != "completed")] | length')
            if [ "$PENDING" -gt 0 ]; then
              echo "Attempt $i/90: $PENDING check(s) still running..."
              sleep 10
              continue
            fi

            CONCLUSIONS=$(echo "$RESULT" | jq -c '[.[] | .conclusion] | unique')
            echo "CI check conclusions: $CONCLUSIONS"

            if [ "$CONCLUSIONS" = '["success"]' ]; then
              echo "All 4 CI checks passed!"
              exit 0
            else
              echo "::error::CI checks failed: $CONCLUSIONS"
              echo "$RESULT" | jq -c '.[] | {name, conclusion}'
              exit 1
            fi
          done

          echo "::error::Timed out waiting for CI checks"
          exit 1

  build-and-push:
    name: Build & Push Docker Image
    needs: ci-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Single production image used for all roles (app, horizon, scheduler).
      # The role is determined at runtime by CONTAINER_ROLE env var and command override.
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/app/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production
          provenance: true
          sbom: true

      - name: Extract nginx metadata
        id: meta-nginx
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-nginx
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push nginx
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx
          provenance: true
          sbom: true

  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST}"

          # Login to GHCR on server (idempotent - safe to re-run)
          $SSH "echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USER}' --password-stdin"

          # Idempotent deploy with rollback on failure
          $SSH "/opt/maisvendas/scripts/deploy.sh"

      - name: Verify deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST}"

          echo "=== Container Status ==="
          $SSH "cd /opt/maisvendas && docker compose ps --format 'table {{.Name}}\t{{.Status}}'"

          echo "=== Health Check ==="
          DOMAIN=$($SSH "grep -oP '^APP_DOMAIN=\K.*' /opt/maisvendas/.env" || echo "api.maisvenda.store")
          for i in $(seq 1 12); do
            STATUS=$($SSH "curl -sf -H 'Host: ${DOMAIN}' http://localhost/v1/health | jq -r '.status' 2>/dev/null" || echo "unreachable")
            if [ "$STATUS" = "healthy" ]; then
              echo "Health check passed: $STATUS"
              rm -f ~/.ssh/deploy_key
              exit 0
            fi
            echo "Attempt $i/12: status=$STATUS, retrying in 5s..."
            sleep 5
          done

          echo "::warning::Health check did not return healthy after 60s"
          rm -f ~/.ssh/deploy_key

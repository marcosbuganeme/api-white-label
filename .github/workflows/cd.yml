name: CD

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - name: Wait for CI and verify it passed
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Waiting for CI checks to complete for $COMMIT_SHA..."

          # Retry up to 90 times (15 min) waiting for checks to finish
          for i in $(seq 1 90); do
            RESULT=$(gh api "repos/$REPO/commits/$COMMIT_SHA/check-runs" \
              --jq '.check_runs | map(select(.name != "ci-gate"))' 2>&1) || {
              echo "::warning::gh api call failed: $RESULT"
              sleep 10
              continue
            }

            TOTAL=$(echo "$RESULT" | jq 'length')
            if [ "$TOTAL" -eq 0 ]; then
              if [ "$i" -gt 24 ]; then
                echo "::error::No CI checks found for commit $COMMIT_SHA after $i attempts."
                echo "::error::Ensure CI ran on this commit before creating a release tag."
                exit 1
              fi
              echo "Attempt $i/90: no CI checks found yet, waiting 10s..."
              sleep 10
              continue
            fi

            PENDING=$(echo "$RESULT" | jq '[.[] | select(.status != "completed")] | length')
            if [ "$PENDING" -gt 0 ]; then
              echo "Attempt $i/90: $PENDING check(s) still running, waiting 10s..."
              sleep 10
              continue
            fi

            CONCLUSIONS=$(echo "$RESULT" | jq '[.[] | .conclusion] | unique')
            echo "Check conclusions: $CONCLUSIONS"

            if [ "$CONCLUSIONS" = '["success"]' ]; then
              echo "All CI checks passed."
              exit 0
            else
              echo "::error::CI checks did not all pass: $CONCLUSIONS"
              exit 1
            fi
          done

          echo "::error::Timed out waiting for CI checks to complete"
          exit 1

  build-and-push:
    name: Build & Push Docker Image
    needs: ci-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Single production image used for all roles (app, horizon, scheduler).
      # The role is determined at runtime by CONTAINER_ROLE env var and command override.
      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc6fbf # v6.18.0
        with:
          context: .
          file: docker/app/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production
          provenance: true
          sbom: true

      - name: Extract nginx metadata
        id: meta-nginx
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-nginx
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push nginx
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc6fbf # v6.18.0
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx
          provenance: true
          sbom: true


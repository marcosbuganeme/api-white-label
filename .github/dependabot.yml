version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      laravel:
        patterns: ["laravel/*"]
      dev-tools:
        patterns: ["larastan/*", "phpunit/*", "fakerphp/*", "mockery/*", "nunomaduro/*"]
        dependency-type: "development"
      drivers:
        patterns: ["mongodb/*", "vladimir-yuldashev/*", "league/*"]
    reviewers:
      - "marcosbuganeme"
    assignees:
      - "marcosbuganeme"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    reviewers:
      - "marcosbuganeme"
    assignees:
      - "marcosbuganeme"

  - package-ecosystem: "docker"
    directory: "/docker/app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
    reviewers:
      - "marcosbuganeme"
    assignees:
      - "marcosbuganeme"

  - package-ecosystem: "docker"
    directory: "/docker/nginx"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "docker"
    reviewers:
      - "marcosbuganeme"
    assignees:
      - "marcosbuganeme"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
    reviewers:
      - "marcosbuganeme"
    assignees:
      - "marcosbuganeme"

###############################################################################
# API MaisVendas - Docker Compose (Development)
#
# Arquitetura:
#   Traefik (edge proxy) → Nginx (web server) → PHP-FPM (app)
#                                                  ├── PostgreSQL (CRUD)
#                                                  ├── Redis (cache/sessions)
#                                                  ├── MongoDB (logs/métricas)
#                                                  └── RabbitMQ (heavy queues)
#
# Uso:
#   docker compose up -d            # Subir tudo
#   docker compose --profile prod   # Perfil de produção
###############################################################################

services:
  # ──────────────────────────────────────────────
  # EDGE PROXY - Traefik
  # ──────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    container_name: maisvendas-traefik
    restart: unless-stopped
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"  # Dashboard (dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - maisvendas
    labels:
      - "traefik.enable=true"

  # ──────────────────────────────────────────────
  # WEB SERVER - Nginx
  # ──────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: maisvendas-nginx
    restart: unless-stopped
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - maisvendas
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${APP_DOMAIN:-api.maisvendas.localhost}`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.middlewares=api-chain@file"
      - "traefik.http.services.api.loadbalancer.server.port=80"
      # HTTPS (production)
      - "traefik.http.routers.api-secure.rule=Host(`${APP_DOMAIN:-api.maisvendas.localhost}`)"
      - "traefik.http.routers.api-secure.entrypoints=websecure"
      - "traefik.http.routers.api-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-secure.middlewares=api-chain@file"

  # ──────────────────────────────────────────────
  # APPLICATION - PHP-FPM
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: ${DOCKER_TARGET:-development}
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    container_name: maisvendas-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - maisvendas
    environment:
      APP_ENV: ${APP_ENV:-local}
      CONTAINER_ROLE: app
      PHP_FPM_PM_MAX_CHILDREN: ${PHP_FPM_PM_MAX_CHILDREN:-50}

  # ──────────────────────────────────────────────
  # HORIZON - Redis Queue Manager
  # ──────────────────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: ${DOCKER_TARGET:-development}
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    container_name: maisvendas-horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - .:/var/www/html
    depends_on:
      app:
        condition: service_healthy
    networks:
      - maisvendas
    environment:
      APP_ENV: ${APP_ENV:-local}
      CONTAINER_ROLE: horizon

  # ──────────────────────────────────────────────
  # RABBITMQ WORKER - Heavy Processing
  # ──────────────────────────────────────────────
  rabbitmq-worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: ${DOCKER_TARGET:-development}
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    container_name: maisvendas-rabbitmq-worker
    restart: unless-stopped
    command: >
      php artisan queue:work rabbitmq
      --queue=processing,data_crossref,reports
      --max-jobs=1000
      --max-time=3600
      --memory=256
      --tries=3
      --sleep=3
    volumes:
      - .:/var/www/html
    depends_on:
      app:
        condition: service_healthy
    networks:
      - maisvendas
    environment:
      APP_ENV: ${APP_ENV:-local}
      CONTAINER_ROLE: rabbitmq-worker
    deploy:
      replicas: ${RABBITMQ_WORKERS:-2}

  # ──────────────────────────────────────────────
  # SCHEDULER - Cron Jobs
  # ──────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: ${DOCKER_TARGET:-development}
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    container_name: maisvendas-scheduler
    restart: unless-stopped
    command: >
      bash -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    volumes:
      - .:/var/www/html
    depends_on:
      app:
        condition: service_healthy
    networks:
      - maisvendas
    environment:
      APP_ENV: ${APP_ENV:-local}
      CONTAINER_ROLE: scheduler

  # ══════════════════════════════════════════════
  # DATA STORES
  # ══════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # PostgreSQL - Primary Relational Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: maisvendas-postgres
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-maisvendas}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - maisvendas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-maisvendas}"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=200
        -c log_min_duration_statement=200
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on

  # ──────────────────────────────────────────────
  # Redis - Cache, Sessions, Light Queues
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: maisvendas-redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --tcp-backlog 511
        --timeout 300
        --tcp-keepalive 60
        --save 60 1000
        --save 300 100
    volumes:
      - redis_data:/data
    networks:
      - maisvendas
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # MongoDB - Logs, Metrics, Processed Data
  # ──────────────────────────────────────────────
  mongodb:
    image: mongo:8
    container_name: maisvendas-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_EXTERNAL_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-maisvendas_logs}
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init:/docker-entrypoint-initdb.d:ro
    networks:
      - maisvendas
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # RabbitMQ - Message Broker (Heavy Processing)
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: maisvendas-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-maisvendas}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-maisvendas}
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 0.7
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - maisvendas
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq.rule=Host(`rabbitmq.maisvendas.localhost`)"
      - "traefik.http.routers.rabbitmq.entrypoints=web"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mongodb_data:
    driver: local
  rabbitmq_data:
    driver: local
  traefik_letsencrypt:
    driver: local

networks:
  maisvendas:
    driver: bridge
    name: maisvendas

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    container_name: maisvendas-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - maisvendas
    environment:
      - APP_ENV=${APP_ENV:-local}
      - CONTAINER_ROLE=app

  nginx:
    image: nginx:1.27-alpine
    container_name: maisvendas-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - maisvendas

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    container_name: maisvendas-horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - maisvendas
    environment:
      - APP_ENV=${APP_ENV:-local}
      - CONTAINER_ROLE=horizon

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    container_name: maisvendas-scheduler
    restart: unless-stopped
    command: >
      bash -c "while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60
      done"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - maisvendas
    environment:
      - APP_ENV=${APP_ENV:-local}
      - CONTAINER_ROLE=scheduler

  postgres:
    image: postgres:17-alpine
    container_name: maisvendas-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-maisvendas}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - maisvendas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: maisvendas-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - maisvendas
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8
    container_name: maisvendas-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-maisvendas_logs}
    volumes:
      - mongodb_data:/data/db
    networks:
      - maisvendas

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mongodb_data:
    driver: local
  vendor_data:
    driver: local

networks:
  maisvendas:
    driver: bridge

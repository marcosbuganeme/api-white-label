# Traefik Dynamic Configuration - Middlewares
http:
  middlewares:
    # Rate limiting (per IP)
    rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Security headers
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"
        customResponseHeaders:
          X-Robots-Tag: "noindex,nofollow"
          Server: ""

    # Compress responses
    compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"

    # Basic auth for RabbitMQ management UI
    # Generate: htpasswd -nB admin
    rabbitmq-auth:
      basicAuth:
        users:
          - "${RABBITMQ_MGMT_HTPASSWD:-admin:$$2y$$05$$placeholder}"

    # Chain of middlewares for API
    api-chain:
      chain:
        middlewares:
          - rate-limit
          - security-headers
          - compress

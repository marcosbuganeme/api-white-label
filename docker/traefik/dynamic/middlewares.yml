# Traefik Dynamic Configuration - Middlewares
http:
  middlewares:
    # Rate limiting (per IP)
    rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Security headers
    security-headers:
      headers:
        contentTypeNosniff: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        frameDeny: true
        customResponseHeaders:
          X-Robots-Tag: "noindex,nofollow"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Server: ""

    # Compress responses
    compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"

    # HTTP to HTTPS redirect (applied per-router, not globally on entrypoint)
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    # Basic auth for RabbitMQ management UI
    # Generate: htpasswd -nB admin
    rabbitmq-auth:
      basicAuth:
        users:
          - "${RABBITMQ_MGMT_HTPASSWD}"

    # Chain of middlewares for API (HTTPS)
    api-chain:
      chain:
        middlewares:
          - rate-limit
          - security-headers
          - compress

    # Chain for HTTP → HTTPS redirect (used on web entrypoint routers)
    api-redirect-chain:
      chain:
        middlewares:
          - redirect-to-https

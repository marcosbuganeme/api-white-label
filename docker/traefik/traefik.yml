# Traefik Static Configuration
api:
  dashboard: true
  insecure: true  # Only for development! Disable in production.

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

# Docker provider - auto-discovers services via labels
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: maisvendas
    watch: true
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Let's Encrypt automatic SSL
certificatesResolvers:
  letsencrypt:
    acme:
      email: "${ACME_EMAIL:-dev@maisvendas.com}"
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

# Access logs (structured)
accessLog:
  format: json
  filters:
    statusCodes:
      - "400-599"

log:
  level: INFO
  format: json

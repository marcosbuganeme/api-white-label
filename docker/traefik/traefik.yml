# Traefik Static Configuration (DEVELOPMENT ONLY)
# IMPORTANT: insecure: true exposes the Traefik API on :8080 without authentication.
# This is acceptable in development because docker-compose.yml binds it to 127.0.0.1 only.
# The production config (traefik.prod.yml) MUST NOT set insecure: true.
api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

# Docker provider via socket proxy (never mount docker.sock directly in Traefik)
providers:
  docker:
    endpoint: "tcp://docker-socket-proxy:2375"
    exposedByDefault: false
    network: maisvendas
    watch: true
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Let's Encrypt automatic SSL (disabled in dev, override in prod)
# certificatesResolvers configured in traefik.prod.yml

# Access logs (structured)
accessLog:
  format: json

log:
  level: INFO
  format: json

# Traefik Static Configuration
api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

# Docker provider - auto-discovers services via labels
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: maisvendas
    watch: true
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Let's Encrypt automatic SSL (disabled in dev, override in prod)
# certificatesResolvers configured in traefik.prod.yml

# Access logs (structured)
accessLog:
  format: json

log:
  level: INFO
  format: json

# Traefik Static Configuration - Production Override
# Usage: mount this file instead of traefik.yml in docker-compose.prod.yml
api:
  dashboard: false
  insecure: false

entryPoints:
  web:
    address: ":80"
    # No global redirect here - redirect is handled per-router via middleware
    # to avoid blocking ACME HTTP-01 challenges on first boot
  websecure:
    address: ":443"

# Docker provider via socket proxy (never mount docker.sock directly in Traefik)
providers:
  docker:
    endpoint: "tcp://docker-socket-proxy:2375"
    exposedByDefault: false
    network: maisvendas
    watch: true
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Let's Encrypt automatic SSL
certificatesResolvers:
  letsencrypt:
    acme:
      email: dev@maisvenda.store
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

# Access logs (structured)
accessLog:
  format: json

log:
  level: WARN
  format: json

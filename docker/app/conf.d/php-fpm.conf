[global]
daemonize = no
error_log = /proc/self/fd/2

[www]
listen = 9000
listen.backlog = 1024

; Process management
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.process_idle_timeout = 10s
pm.max_requests = 1000

; Logging
access.log = /proc/self/fd/2
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"

; Security
; clear_env = no is required for Laravel to read env vars in Docker containers.
; All env vars are injected by Docker Compose and are necessary for the application.
; In non-containerized environments, use clear_env = yes with explicit env[] directives.
clear_env = no
catch_workers_output = yes
decorate_workers_output = no

; Health check
ping.path = /ping
ping.response = pong
pm.status_path = /status

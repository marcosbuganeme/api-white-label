; =============================================================================
; PHP-FPM Production Override
; Otimizado para container com limit de 768M
; 4 workers x ~120M real RSS = 480M + opcache 128M + master ~40M = ~648M
; Margem: ~120M para picos e overhead do sistema
; =============================================================================

[www]
pm = dynamic
pm.max_children = 4
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.process_idle_timeout = 10s
pm.max_requests = 1000

; Must remain 'no' in Docker: PHP-FPM workers need env vars injected by Docker Compose
clear_env = no

; =============================================================================
; PHP-FPM Production Override
; Otimizado para container com limit de 512M
; 5 workers × ~50MB avg + opcache 128MB = ~378MB
; =============================================================================

[www]
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.process_idle_timeout = 10s
pm.max_requests = 500

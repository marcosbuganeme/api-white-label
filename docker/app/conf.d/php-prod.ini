[opcache]
; Production: disable timestamp validation for max performance
opcache.validate_timestamps = 0
; Production: reduce opcache memory to fit container limits
opcache.memory_consumption = 128
; Enable JIT in production (tracing mode - good for web apps)
; Numeric value: 1205 = AVX enabled, global register alloc, compile on first use, tracing JIT
opcache.jit = 1205
opcache.jit_buffer_size = 16M

[PHP]
memory_limit = 96M
display_errors = Off
display_startup_errors = Off
expose_php = Off
